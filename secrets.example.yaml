# Copy this file to secrets.yaml and replace the placeholder values.
# secrets.yaml is ignored by Git and is used to generate src/secrets_local.h.

wifi_primary_ssid: "YourWiFiSSID"
wifi_primary_password: "YourWiFiPassword"

# Optional backup WiFi. Provide both values or leave both commented.
# wifi_backup_ssid: "YourBackupWiFiSSID"
# wifi_backup_password: "YourBackupWiFiPassword"

# Optional static IP. Provide both values or leave both commented.
# wifi_static_ip: "192.168.1.50"
# wifi_gateway: "192.168.1.1"

mqtt_host: "192.168.1.10"
mqtt_port: 1883
mqtt_username: "mqtt_user"
mqtt_password: "mqtt_password"

ota_password: "change_me"
